version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: mikael_mongo
    restart: unless-stopped
    command: ["--bind_ip_all"]
    volumes:
      - mikael_mongo_data:/data/db
    # Не публикуем порт наружу: база должна быть доступна только внутри docker-сети
    # ports:
    #   - "27017:27017"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mikael_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/mental-arithmetic
    depends_on:
      - mongo
    ports:
      # Сайт и API будут доступны по http://SERVER_IP/ (80 -> 5000)
      - "80:5000"

volumes:
  mikael_mongo_data:


